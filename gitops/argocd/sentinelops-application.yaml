apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinelops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/sentinelops.git
    targetRevision: main
    path: deploy/kubernetes/base
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinelops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
