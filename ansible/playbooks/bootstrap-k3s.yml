---
- name: Bootstrap SentinelOps k3s node
  hosts: all
  become: true
  tasks:
    - name: Ensure required packages are installed
      ansible.builtin.package:
        name:
          - curl
          - git
        state: present

    - name: Print bootstrap instruction
      ansible.builtin.debug:
        msg: "Install k3s, Helm, Argo CD, and apply SentinelOps GitOps application."
