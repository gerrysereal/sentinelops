apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelops-postgres
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinelops-postgres
  template:
    metadata:
      labels:
        app: sentinelops-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: sentinelops-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelops-postgres
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: sentinelops-postgres
  ports:
    - port: 5432
      targetPort: 5432
