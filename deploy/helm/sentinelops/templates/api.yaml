apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelops-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: sentinelops-api
  template:
    metadata:
      labels:
        app: sentinelops-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: sentinelops-config
            - secretRef:
                name: sentinelops-secret
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelops-api
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: sentinelops-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
